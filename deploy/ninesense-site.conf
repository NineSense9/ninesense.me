server {
    listen 8811 default_server;
    listen [::]:8811 default_server;
    server_name _;

    root /var/www/ninesense/current;
    index index.html;
    charset utf-8;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    include /etc/nginx/snippets/ninesense-guestbook.conf;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        expires -1;
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
        expires 1h;
    }

    location = /robots.txt {
        default_type text/plain;
    }

    location ~* \.(?:jpg|jpeg|png|webp|svg|ico)$ {
        expires 7d;
        try_files $uri =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}

